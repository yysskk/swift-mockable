name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift-version: ['5.9', '5.10', '6.2']
    container: swift:${{ matrix.swift-version }}
    steps:
      - uses: actions/checkout@v7

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      # Tests use swift-testing, which is bundled with Swift 6 toolchains only,
      # so Swift 5.9 and 5.10 are build-only.
      - name: Run tests
        if: startsWith(matrix.swift-version, '6.')
        run: swift test

  # The regular jobs build and test against the swift-syntax version in
  # Package.resolved. This job proves the whole accepted range stays buildable:
  # the floor of the range and the latest patch of every other swift-syntax
  # major, plus the floor/oldest-toolchain pairings the manifests advertise.
  # Tests need the resolved swift-syntax (SwiftSyntaxMacrosGenericTestSupport
  # exists only from 600 and the pinned expansions assume the resolved
  # formatting), so like the Swift 5.9/5.10 jobs this is build-only.
  swift-syntax-compat:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift-version: ['6.2']
        swift-syntax-version: ['509.0.0', '510.0.3', '600.0.1', '601.0.1', '602.0.0']
        include:
          - swift-version: '5.9'
            swift-syntax-version: '509.0.0'
          - swift-version: '5.10'
            swift-syntax-version: '510.0.3'
    container: swift:${{ matrix.swift-version }}
    steps:
      - uses: actions/checkout@v7

      - name: Show Swift version
        run: swift --version

      - name: Pin swift-syntax ${{ matrix.swift-syntax-version }}
        run: swift package resolve swift-syntax --version ${{ matrix.swift-syntax-version }}

      - name: Build
        run: swift build

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Select latest stable Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | grep -iv beta | sort -V | tail -1)"

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

  test:
    runs-on: ubuntu-latest
    needs: [build, swift-syntax-compat, macos]
    if: always()
    steps:
      - name: Check build results
        run: |
          if [ "${{ needs.build.result }}" != "success" ] || [ "${{ needs['swift-syntax-compat'].result }}" != "success" ] || [ "${{ needs.macos.result }}" != "success" ]; then
            echo "Build failed"
            exit 1
          fi
          echo "All builds passed"
