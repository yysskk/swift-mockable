name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift-version: ['5.9', '5.10', '6.2']
    container: swift:${{ matrix.swift-version }}
    steps:
      - uses: actions/checkout@v7

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      # Tests use swift-testing, which is bundled with Swift 6 toolchains only,
      # so Swift 5.9 and 5.10 are build-only.
      - name: Run tests
        if: startsWith(matrix.swift-version, '6.')
        run: swift test

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Select latest stable Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | grep -iv beta | sort -V | tail -1)"

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

  test:
    runs-on: ubuntu-latest
    needs: [build, macos]
    if: always()
    steps:
      - name: Check build results
        run: |
          if [ "${{ needs.build.result }}" != "success" ] || [ "${{ needs.macos.result }}" != "success" ]; then
            echo "Build failed"
            exit 1
          fi
          echo "All builds passed"
